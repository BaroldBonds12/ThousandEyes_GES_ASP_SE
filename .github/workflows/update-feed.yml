name: Update Tech Radar Feed

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds
        run: npm run update-feed

      - name: Commit feed if changed
        run: |
          if git diff --quiet docs/data/feed.json; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/feed.json
          git commit -m "chore: update tech radar feed [skip ci]"
          git push
